<div class="page">
  <div class="background-container">
    <div class="background-pattern"></div>
  </div>
  
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="url(#gradient)"/>
          <path d="M24 14L18 20L20 22L24 18L28 22L30 20L24 14Z" fill="white"/>
          <path d="M24 34L30 28L28 26L24 30L20 26L18 28L24 34Z" fill="white"/>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48">
              <stop stop-color="#667eea"/>
              <stop offset="1" stop-color="#764ba2"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Asset Tracker Pro</h1>
      <p class="subtitle">Enterprise Asset Management System</p>
    </div>

    <div class="tabs-container">
      <div class="tabs">
        <button type="button" class="tab" [class.active]="mode === 'signin'" (click)="setMode('signin')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign In
        </button>
        <button type="button" class="tab" [class.active]="mode === 'signup'" (click)="setMode('signup')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          Sign Up
        </button>
      </div>
    </div>

    <form *ngIf="mode === 'signin'" (ngSubmit)="onLocalSignIn()" class="form">
      <div class="form-group">
        <label class="label">
          <span class="label-text">Username or Email</span>
          <div class="input-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input class="input" name="signinUsername" [(ngModel)]="signin.username" autocomplete="username" placeholder="Enter your username" required />
          </div>
        </label>
      </div>

      <div class="form-group">
        <label class="label">
          <span class="label-text">Password</span>
          <div class="input-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              class="input"
              type="password"
              name="signinPassword"
              [(ngModel)]="signin.password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
            />
          </div>
        </label>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox">
          <span class="checkmark"></span>
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Sign In</span>
        <span *ngIf="isSubmitting" class="loading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-6.219-8.56"/>
          </svg>
          Signing in...
        </span>
      </button>
    </form>

    <form *ngIf="mode === 'signup'" (ngSubmit)="onLocalSignUp()" class="form">
      <div class="form-group">
        <label class="label">
          <span class="label-text">Username</span>
          <div class="input-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input class="input" name="signupUsername" [(ngModel)]="signup.username" autocomplete="username" placeholder="Choose a username" required />
          </div>
        </label>
      </div>

      <div class="form-group">
        <label class="label">
          <span class="label-text">Email</span>
          <div class="input-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input class="input" type="email" name="signupEmail" [(ngModel)]="signup.email" autocomplete="email" placeholder="your@email.com" />
          </div>
        </label>
      </div>

      <div class="form-group">
        <label class="label">
          <span class="label-text">Password</span>
          <div class="input-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              class="input"
              type="password"
              name="signupPassword"
              [(ngModel)]="signup.password"
              autocomplete="new-password"
              placeholder="Create a strong password"
              required
            />
          </div>
        </label>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox" required>
          <span class="checkmark"></span>
          I agree to the <a href="#" class="terms-link">Terms & Conditions</a>
        </label>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Create Account</span>
        <span *ngIf="isSubmitting" class="loading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-6.219-8.56"/>
          </svg>
          Creating...
        </span>
      </button>
    </form>

    <div *ngIf="errorMessage" class="alert alert-error">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      {{ errorMessage }}
    </div>

    <div class="divider">
      <span>OR</span>
    </div>

    <div class="sso-container">
      <button type="button" class="btn btn-google" (click)="onGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <p class="security-note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Your data is secure and encrypted
    </p>
  </div>
</div>
